name: Update Stats JSON (Reddit, Discord, TikTok, YouTube)

on:
  schedule:
    - cron: "0 */4 * * *" # Runs daily at midnight UTC
  workflow_dispatch: {} # Allows manual triggering

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    env:
      CURL_FLAGS: --fail --silent --show-error --location --max-time 20 --retry 2 --retry-delay 2 --retry-all-errors

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Fetch Reddit Data
        id: reddit
        continue-on-error: true
        run: |
          echo "Fetching Reddit data from Cloudflare Worker..."
          if ! RESPONSE=$(curl $CURL_FLAGS "https://reddit-fetcher.patres-inferni.workers.dev/"); then
            echo "::warning::Reddit fetch failed. Keeping the previous Reddit stats."
            exit 0
          fi

          echo "Raw Reddit response:"
          echo "$RESPONSE"

          if ! SUBSCRIBERS=$(echo "$RESPONSE" | jq -er '.data.subscribers | numbers' 2>/dev/null); then
            echo "::warning::Reddit response did not contain a numeric subscriber count. Keeping the previous Reddit stats."
            exit 0
          fi

          echo "subscribers=$SUBSCRIBERS" >> $GITHUB_OUTPUT

      - name: Fetch Discord Data
        id: discord
        continue-on-error: true
        run: |
          echo "Fetching Discord data..."
          if ! DISCORD_RESPONSE=$(curl $CURL_FLAGS "https://discord.com/api/invites/helldads?with_counts=true&with_expiration=true"); then
            echo "::warning::Discord fetch failed. Keeping the previous Discord stats."
            exit 0
          fi

          echo "Raw Discord response:"
          echo "$DISCORD_RESPONSE"

          if ! MEMBER_COUNT=$(echo "$DISCORD_RESPONSE" | jq -er '.approximate_member_count | numbers' 2>/dev/null); then
            echo "::warning::Discord response did not contain a numeric member count. Keeping the previous Discord member count."
          else
            echo "members=$MEMBER_COUNT" >> $GITHUB_OUTPUT
          fi

          if ! PRESENCE_COUNT=$(echo "$DISCORD_RESPONSE" | jq -er '.approximate_presence_count | numbers' 2>/dev/null); then
            echo "::warning::Discord response did not contain a numeric presence count. Keeping the previous Discord presence count."
          else
            echo "presence=$PRESENCE_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Fetch TikTok Data
        id: tiktok
        continue-on-error: true
        run: |
          echo "Fetching TikTok page..."
          if ! TIKTOK_RESPONSE=$(curl $CURL_FLAGS "https://www.tiktok.com/@helldads"); then
            echo "::warning::TikTok fetch failed. Keeping the previous TikTok stats."
            exit 0
          fi

          echo "Raw Tiktok response:"
          echo "$TIKTOK_RESPONSE"

          echo "Extracting stats JSON..."
          STATS_JSON=$(echo "$TIKTOK_RESPONSE" | grep -oP '"stats":\s*{\K[^}]+(?=})' | head -n1 || true)
          if [ -z "$STATS_JSON" ]; then
            echo "::warning::TikTok page did not contain stats JSON. Keeping the previous TikTok stats."
            exit 0
          fi

          STATS_JSON="{\"stats\":{$STATS_JSON}}"

          echo "Raw extracted stats:"
          echo "$STATS_JSON" | jq . || true

          if ! FOLLOWER_COUNT=$(echo "$STATS_JSON" | jq -er '.stats.followerCount | numbers' 2>/dev/null); then
            echo "::warning::TikTok stats did not contain a numeric follower count. Keeping the previous TikTok follower count."
          else
            echo "follower_count=$FOLLOWER_COUNT" >> $GITHUB_OUTPUT
          fi

          if ! VIDEO_COUNT=$(echo "$STATS_JSON" | jq -er '.stats.videoCount | numbers' 2>/dev/null); then
            echo "::warning::TikTok stats did not contain a numeric video count. Keeping the previous TikTok video count."
          else
            echo "video_count=$VIDEO_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Fetch YouTube Data
        id: youtube
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }} # Replace with your YouTube channel ID
        run: |
          echo "Fetching YouTube data..."
          if [ -z "$YOUTUBE_API_KEY" ] || [ -z "$YOUTUBE_CHANNEL_ID" ]; then
            echo "::warning::YouTube secrets are not configured. Keeping the previous YouTube stats."
            exit 0
          fi

          if ! RESPONSE=$(curl $CURL_FLAGS "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${YOUTUBE_CHANNEL_ID}&key=${YOUTUBE_API_KEY}"); then
            echo "::warning::YouTube fetch failed. Keeping the previous YouTube stats."
            exit 0
          fi

          echo "Raw YouTube response:"
          echo "$RESPONSE"

          if ! SUBSCRIBER_COUNT=$(echo "$RESPONSE" | jq -er '.items[0].statistics.subscriberCount | tonumber' 2>/dev/null); then
            echo "::warning::YouTube response did not contain a numeric subscriber count. Keeping the previous YouTube subscriber count."
          else
            echo "youtube_subscriber_count=$SUBSCRIBER_COUNT" >> $GITHUB_OUTPUT
          fi

          if ! VIDEO_COUNT=$(echo "$RESPONSE" | jq -er '.items[0].statistics.videoCount | tonumber' 2>/dev/null); then
            echo "::warning::YouTube response did not contain a numeric video count. Keeping the previous YouTube video count."
          else
            echo "youtube_video_count=$VIDEO_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Load stats.json and process values
        id: load_and_process
        run: |
          current_value() {
            jq -er "$1 | numbers" stats.json 2>/dev/null || echo 0
          }

          resolved_value() {
            local new_value="$1"
            local current_path="$2"

            if echo "$new_value" | jq -er 'tonumber | numbers' >/dev/null 2>&1; then
              echo "$new_value"
            else
              current_value "$current_path"
            fi
          }

          # Validate and set new values or fallback to existing ones
          REDDIT_SUBSCRIBERS=$(resolved_value "${{ steps.reddit.outputs.subscribers }}" '.reddit.subscribers')
          DISCORD_MEMBERS=$(resolved_value "${{ steps.discord.outputs.members }}" '.discord.approximate_member_count')
          DISCORD_PRESENCE=$(resolved_value "${{ steps.discord.outputs.presence }}" '.discord.approximate_presence_count')
          TIKTOK_FOLLOWER_COUNT=$(resolved_value "${{ steps.tiktok.outputs.follower_count }}" '.tiktok.follower_count')
          TIKTOK_VIDEO_COUNT=$(resolved_value "${{ steps.tiktok.outputs.video_count }}" '.tiktok.video_count')
          YOUTUBE_SUBSCRIBER_COUNT=$(resolved_value "${{ steps.youtube.outputs.youtube_subscriber_count }}" '.youtube.subscriber_count')
          YOUTUBE_VIDEO_COUNT=$(resolved_value "${{ steps.youtube.outputs.youtube_video_count }}" '.youtube.video_count')

          # Write the updated stats.json file with fallback values
          jq -n \
            --argjson reddit_subscribers "$REDDIT_SUBSCRIBERS" \
            --argjson discord_members "$DISCORD_MEMBERS" \
            --argjson discord_presence "$DISCORD_PRESENCE" \
            --argjson tiktok_follower_count "$TIKTOK_FOLLOWER_COUNT" \
            --argjson tiktok_video_count "$TIKTOK_VIDEO_COUNT" \
            --argjson youtube_subscriber_count "$YOUTUBE_SUBSCRIBER_COUNT" \
            --argjson youtube_video_count "$YOUTUBE_VIDEO_COUNT" \
            --arg last_updated "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              reddit: { subscribers: $reddit_subscribers },
              discord: {
                approximate_member_count: $discord_members,
                approximate_presence_count: $discord_presence
              },
              tiktok: {
                follower_count: $tiktok_follower_count,
                video_count: $tiktok_video_count
              },
              youtube: {
                subscriber_count: $youtube_subscriber_count,
                video_count: $youtube_video_count
              },
              lastUpdated: $last_updated
            }' > stats.json

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update community stats"
            git push
          fi
